version: '3'
env_file:
  - ../.env
services:
  redis:
    image: redis:5.0
    container_name: redis5.0
    restart: always
    network_mode: bridge
    command: ["redis-server", "/etc/redis.conf", "--requirepass", "$REDIS_PASSWORD"]
    ports:
      - "6379:6379"
    environment:
      REDIS_PASSWORD: $REDIS_PASSWORD
    volumes:
      - ./data:/data
      - ./redis.conf:/etc/redis.conf

