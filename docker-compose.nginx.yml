version: '3.8'

services:
  # Nginx 服务
  nginx:
    image: nginx:alpine
    container_name: nginx-server
    restart: always
    networks:
      - app_network
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/vhost:/etc/nginx/vhost:ro
      - ./nginx/html:/usr/share/nginx/html
      - ./nginx/logs:/var/log/nginx
      - ./project:/data/project
    depends_on:
      - private

networks:
  app_network:
    external: true  # 使用外部定义的网络