server {
	listen       80;
	server_name  shop.domain_name pop.domain_name;
	index index.htm index.html index.php;
	root /data/project/front/shop;
	error_log  /var/log/nginx/pop.error.log;
	access_log  /var/log/nginx/pop.access.log;

	location ^~ /webShop/ {
            alias /data/project/backend/public/sj/;
        }

        location ~^/v1/cloudClient/order/againSends  {
            proxy_pass http://HOST_IP:8199;
            proxy_set_header Host $host;
            proxy_buffering off;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location = /  {
            proxy_pass http://HOST_IP:8199/sj/index;
            proxy_set_header Host $host;
            proxy_buffering off;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

          }

        location / {
            index  index.html index.htm;
            try_files $uri $uri/ @router; # 需要指向下面的@router否则会出现vue的路由在nginx中刷新出现404
          }

          location @router {
            rewrite ^.*$ /index.html last;
          }
		
        location ~ .*\.(gif|jpg|jpeg|png|bmp|swf)$
        {
            expires      30d;
        }

        location ~ .*\.(js|css)?$
        {
            expires      12h;
        }

        location ~ /.well-known {
            allow all;
        }

        location ~ /\.
        {
            deny all;
        }

}

