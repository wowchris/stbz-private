version: '3.8'
services:
  nginx:
    image: nginx:stable-alpine   
    container_name: nginx-server
    restart: always   
    network_mode: bridge
    ports:
      - "80:80"     
      - "443:443"   
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro   
      - ./vhost:/etc/nginx/vhost:ro  
      - ./html:/usr/share/nginx/html  
      - ./logs:/var/log/nginx  
      # 批量映射-所有子项目
      - ./project:/data/project        
    environment:
      - TZ=Asia/Shanghai

networks:
  default:
    driver: bridge