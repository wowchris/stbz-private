version: '3.8'

services:
  # 私有应用服务
  private:
    image: golang:alpine
    container_name: private_server
    restart: always
    networks:
      - app_network
    volumes:
      - ./project/backend:/go/private_server
    working_dir: /go/private_server
    entrypoint: ./main server
    environment:
      - DB_HOST=${MYSQL_HOST:-mysql}
      - DB_PORT=${MYSQL_PORT:-3306}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_DATABASE}
      - REDIS_HOST=redis
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    depends_on:
      - redis

  # Nginx 服务
  nginx:
    image: nginx:alpine
    container_name: nginx-server
    restart: always
    networks:
      - app_network
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/vhost:/etc/nginx/vhost:ro
      - ./nginx/html:/usr/share/nginx/html
      - ./nginx/logs:/var/log/nginx
      - ./project:/data/project
    depends_on:
      - private

  # 监控服务
  monitor:
    image: golang:alpine
    container_name: monitor_service
    restart: always
    networks:
      - app_network
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - DB_HOST=${MYSQL_HOST:-mysql}
      - REDIS_HOST=redis
    depends_on:
      - redis

networks:
  app_network:
    external: true  # 使用外部定义的网络