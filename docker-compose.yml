version: '3.8'

# 定义统一网络
networks:
  app_network:
    driver: bridge

services:
  # MySQL 服务
  mysql:
    image: mysql:5.7
    container_name: mysql5.7
    restart: always
    networks:
      - app_network
    volumes:
      - ./mysql/data:/var/lib/mysql
      - ./mysql/conf/my.cnf:/etc/mysql/my.cnf
    environment:
      - MYSQL_ROOT_PASSWORD=${DB_PASSWORD}
      - MYSQL_DATABASE=${DB_DATABASE}
      - MYSQL_USER=${DB_USER}
    command: [
      '--character-set-server=utf8mb4',
      '--collation-server=utf8mb4_general_ci',
      '--max_connections=3000',
      '--max_allowed_packet=1024M',
      '--lower_case_table_names=1'
    ]

  # Redis 服务
  redis:
    image: redis:5.0
    container_name: redis5.0
    restart: always
    networks:
      - app_network
    volumes:
      - ./redis/data:/data
      - ./redis/redis.conf:/etc/redis.conf
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    command: ["redis-server", "/etc/redis.conf", "--requirepass", "${REDIS_PASSWORD}"]

  # NSQ 消息队列服务
  nsqlookupd:
    image: nsqio/nsq
    container_name: nsq-lookupd
    restart: always
    command: /nsqlookupd
    networks:
      - app_network
    volumes:
      - ./nsq/data1:/data:rw

  nsqd:
    image: nsqio/nsq
    container_name: nsqd
    restart: always
    command: /nsqd -lookupd-tcp-address=nsqlookupd:4160
    networks:
      - app_network
    volumes:
      - ./nsq/data1:/data:rw

  # Elasticsearch 服务
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:7.7.0
    container_name: elasticsearch
    restart: always
    networks:
      - app_network
    volumes:
      - ./elk/elasticsearch/data:/usr/share/elasticsearch/data
      - ./elk/elasticsearch/config/elasticsearch.yml:/usr/share/elasticsearch/config/elasticsearch.yml:ro
    environment:
      - discovery.type=single-node
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"

  # Kibana 服务
  kibana:
    image: docker.elastic.co/kibana/kibana:7.7.0
    container_name: kibana
    restart: always
    networks:
      - app_network
    volumes:
      - ./elk/kibana/config/kibana.yml:/usr/share/kibana/config/kibana.yml
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
      - SERVER_NAME=kibana
    depends_on:
      - elasticsearch

  # 私有应用服务
  private:
    image: golang:alpine
    container_name: private_server
    restart: always
    networks:
      - app_network
    volumes:
      - ./project/backend:/go/private_server
    working_dir: /go/private_server
    entrypoint: ./main server
    environment:
      - DB_HOST=${MYSQL_HOST:-mysql}
      - DB_PORT=${MYSQL_PORT:-3306}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_DATABASE}
      - REDIS_HOST=redis
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    depends_on:
      - redis

  # Nginx 服务
  nginx:
    image: nginx:alpine
    container_name: nginx-server
    restart: always
    networks:
      - app_network
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/vhost:/etc/nginx/vhost:ro
      - ./nginx/html:/usr/share/nginx/html
      - ./nginx/logs:/var/log/nginx
      - ./project:/data/project
    depends_on:
      - private

  # 监控服务
  monitor:
    image: golang:alpine
    container_name: monitor_service
    restart: always
    networks:
      - app_network
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - DB_HOST=${MYSQL_HOST:-mysql}
      - REDIS_HOST=redis
    depends_on:
      - redis