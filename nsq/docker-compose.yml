version: "3"
services:
  ysdp-nsq-admin:
    image: nsqio/nsq
    container_name: ysdp-nsq-admin
    restart: always
    command: /nsqadmin -lookupd-http-address=ysdp-nsq-nsqlookupd1:4161 -lookupd-http-address=ysdp-nsq-nsqlookupd2:4261
    ports:
      - "4171:4171"
    networks:
      - nsqnet
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "4171"]
      interval: 30s
      timeout: 10s
      retries: 5

  ysdp-nsq-nsqd1:
    image: nsqio/nsq
    container_name: ysdp-nsq-nsqd1
    restart: always
    hostname: ysdp-nsq-nsqd1
    command: /nsqd -tcp-address=0.0.0.0:4150 -http-address=0.0.0.0:4151 -data-path=/data -lookupd-tcp-address=ysdp-nsq-nsqlookupd1:4160 -lookupd-tcp-address=ysdp-nsq-nsqlookupd2:4260 -broadcast-address=ysdp-nsq-nsqd1
    volumes:
      - ./data1:/data:rw
    ports:
      - "4150:4150"
      - "4151:4151"
    networks:
      - nsqnet
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "4151"]
      interval: 30s
      timeout: 10s
      retries: 5

  ysdp-nsq-nsqd2:
    image: nsqio/nsq
    container_name: ysdp-nsq-nsqd2
    restart: always
    hostname: ysdp-nsq-nsqd2
    command: /nsqd -tcp-address=0.0.0.0:4250 -http-address=0.0.0.0:4251 -data-path=/data -lookupd-tcp-address=ysdp-nsq-nsqlookupd1:4160 -lookupd-tcp-address=ysdp-nsq-nsqlookupd2:4260 -broadcast-address=ysdp-nsq-nsqd2
    volumes:
      - ./data2:/data:rw
    ports:
      - "4250:4250"
      - "4251:4251"
    networks:
      - nsqnet
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "4251"]
      interval: 30s
      timeout: 10s
      retries: 5

  ysdp-nsq-nsqlookupd1:
    image: nsqio/nsq
    container_name: ysdp-nsq-nsqlookupd1
    command: /nsqlookupd -http-address=0.0.0.0:4161 -tcp-address=0.0.0.0:4160 -broadcast-address=ysdp-nsq-nsqlookupd1
    ports:
      - "4160:4160"
      - "4161:4161"
    networks:
      - nsqnet
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "4161"]
      interval: 30s
      timeout: 10s
      retries: 5

  ysdp-nsq-nsqlookupd2:
    image: nsqio/nsq
    container_name: ysdp-nsq-nsqlookupd2
    command: /nsqlookupd -http-address=0.0.0.0:4261 -tcp-address=0.0.0.0:4260 -broadcast-address=ysdp-nsq-nsqlookupd2
    ports:
      - "4260:4260"
      - "4261:4261"
    networks:
      - nsqnet
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "4261"]
      interval: 30s
      timeout: 10s
      retries: 5
networks:
  nsqnet:
